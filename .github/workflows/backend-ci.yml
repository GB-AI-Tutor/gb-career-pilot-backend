# .github/workflows/backend-ci.yml
name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      
      - name: Set up Python with uv
        run: uv python install 3.11
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies
        run: |
          uv pip install -r requirements.txt
          uv pip install pytest pytest-cov pytest-asyncio
      
      - name: Lint with Ruff
        run: |
          uv pip install ruff
          ruff check src/
        continue-on-error: true
      
      - name: Check code formatting
        run: |
          ruff format --check src/
        continue-on-error: true
      
      - name: Run tests
        env:
          # REQUIRED - Must have in GitHub Secrets
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          
          # OPTIONAL - Won't fail if missing
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PROJECT_EMAIL: ${{ secrets.PROJECT_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD}}
          ALGORITHM : ${{ secrets.ALGORITHM}}
          BREVO_API : ${{ secrets.BREVO_API}}
          ACCESS_TOKE_TIME: ${{ vars.ACCESS_TOKE_TIME}}
          REFRESH_ACCESS_TOKEN_TIME: ${{vars.REFRESH_ACCESS_TOKE_TIME}}
          ENVIRONMENT: test
          FRONTEND_URL: http://localhost:5173
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv run pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml
        continue-on-error: true
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
      
      - name: Check test coverage
        run: |
          coverage report --fail-under=50
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r src/ -f json -o bandit-report.json || true
        continue-on-error: true
      
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json
        if: always()

  deploy:
    name: Deploy to Render
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Notify Render Deployment
        run: |
          echo "✅ Render auto-deploys from main branch"
          echo "Deployment will happen automatically"
          echo "Check: https://dashboard.render.com"
      
      - name: Post deployment notification
        if: success()
        run: |
          echo "🚀 Backend deployment triggered!"
          echo "API: https://gb-career-pilot-api.onrender.com"
