[tool.pytest.ini_options]
# Tell pytest where to find the src module
pythonpath = ["."]
# Specify test file patterns
testpaths = ["tests"]
# Show extra test summary info
addopts = "-v --tb=short"

[tool.mypy]
# This tells mypy to look inside the 'src' directory for modules
mypy_path = "src"

# This allows mypy to find modules even if they don't have an __init__.py
explicit_package_bases = true
namespace_packages = true

# Optional: suppress errors for 3rd party libs without stubs (like supabase)
ignore_missing_imports = true

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-mock>=3.14.0",
]
